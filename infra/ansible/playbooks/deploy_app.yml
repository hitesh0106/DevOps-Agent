---
- name: Deploy DevOps Agent Application
  hosts: all
  become: true
  become_user: agent

  vars:
    app_dir: /opt/devops-agent
    repo_url: https://github.com/hitesh0106/DevOps-Agent.git
    branch: main

  tasks:
    - name: Clone/update repository
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ branch }}"
        force: yes

    - name: Create virtual environment
      command: python3.11 -m venv {{ app_dir }}/venv
      args:
        creates: "{{ app_dir }}/venv"

    - name: Install Python dependencies
      pip:
        requirements: "{{ app_dir }}/requirements.txt"
        virtualenv: "{{ app_dir }}/venv"

    - name: Copy environment file
      copy:
        src: "{{ app_dir }}/.env.example"
        dest: "{{ app_dir }}/.env"
        remote_src: yes
        force: no

    - name: Start application with Docker Compose
      command: docker-compose up -d
      args:
        chdir: "{{ app_dir }}"
