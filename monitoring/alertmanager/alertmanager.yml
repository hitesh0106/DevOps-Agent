global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'webhooks'

receivers:
  - name: 'webhooks'
    webhook_configs:
      - url: 'http://agent-api:8000/webhook/alertmanager'
        send_resolved: true
