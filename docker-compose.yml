# ============================================
# DevOps Agent — Docker Compose Stack
# ============================================

version: "3.9"

services:
  # ── Agent API Server ─────────────────────────
  agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-agent-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://agent:agentpass@postgres:5432/devops_agent
      - REDIS_URL=redis://redis:6379/0
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
      - SIMULATION_MODE=true
      - LOG_LEVEL=INFO
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - devops-net

  # ── Celery Worker ────────────────────────────
  agent-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-agent-worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://agent:agentpass@postgres:5432/devops_agent
      - REDIS_URL=redis://redis:6379/0
      - SIMULATION_MODE=true
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    networks:
      - devops-net

  # ── PostgreSQL Database ──────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: devops-agent-db
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: devops_agent
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d devops_agent"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devops-net

  # ── Redis (Queue & Cache) ────────────────────
  redis:
    image: redis:7-alpine
    container_name: devops-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - devops-net

  # ── Prometheus ───────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: devops-agent-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheusdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - devops-net

  # ── Grafana ──────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: devops-agent-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - devops-net

  # ── Alertmanager ─────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: devops-agent-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    restart: unless-stopped
    networks:
      - devops-net

volumes:
  pgdata:
  redisdata:
  prometheusdata:
  grafanadata:

networks:
  devops-net:
    driver: bridge
